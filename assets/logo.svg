<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SwiftForge">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9447"/>
      <stop offset="0.5" stop-color="#F2541E"/>
      <stop offset="1" stop-color="#D62F18"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE7D6"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="16" y="16" width="480" height="480" rx="116"/>
    </clipPath>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>

  <!-- Liquid Glass sheen -->
  <g clip-path="url(#squircle)">
    <ellipse cx="170" cy="120" rx="250" ry="140" fill="#FFFFFF" opacity="0.14"/>
  </g>

  <!-- forge spark / sparkles -->
  <path d="M256 104 Q256 256 408 256 Q256 256 256 408 Q256 256 104 256 Q256 256 256 104 Z" fill="url(#spark)" opacity="0.97"/>
  <path d="M388 112 Q388 158 434 158 Q388 158 388 204 Q388 158 342 158 Q388 158 388 112 Z" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="150" cy="372" r="15" fill="#FFFFFF" opacity="0.85"/>
</svg>
